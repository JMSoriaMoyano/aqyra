name: CI (Llave 1)

# Llave 1 — automática. En cada PR corre core + packs + golden + validación de esquemas.
# Rojo bloquea el merge (regla de protección de rama). El CI NUNCA certifica: la firma
# (Llave 2) es humana, en el flujo de release.
# NOTA DE GOBIERNO: el contexto requerido por la protección de main es el `name:` del job,
# que DEBE ser exactamente `gate`. No renombrar sin actualizar la protección de rama.
# Hilo 3.1: el visor ES un paquete real (re-home a apps/visor) — el paso pnpm corre
# tsc/build/tests DE VERDAD, incluido el E2E headless del derivado congelado (C4-FED-06).
# La deuda del placeholder (anotada al publicar el repo) queda saldada.

on:
  pull_request:
  push:
    branches: [main]

# cancela runs viejos del mismo PR
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    name: gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # historia completa para el cálculo de "afectado"

      - name: Instalar uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sincronizar workspace
        run: uv sync --all-packages

      - name: Calcular objetivos afectados (informativo)
        run: uv run python tools/affected.py --base origin/${{ github.base_ref || 'main' }} || true

      - name: Conformidad SDD (proceso · openspec/changes obligatorio)
        env:
          PR_LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
        run: python3 tools/check_sdd_conformance.py --base origin/${{ github.base_ref || 'main' }}

      - name: Paso 1 · núcleo (core) + packs + engine C1 + service C4 + engine C3 + engine C5 + adaptador BC3 + compositor documentos — comportamiento, identidad y golden de pack
        run: uv run pytest packages/core packages/packs engines/ifc services/federacion engines/cumplimiento engines/presupuesto engines/bc3 documentos/presupuesto documentos/comun documentos/export -q

      # PR-E4: paso ÚNICO de builds (n=3 builders, criterio anclado en NUCLEO_PR-E3_cierre.md).
      # Ejecuta TODOS los tools/build_plugin_*.py: un plugin nuevo ya no toca este fichero.
      # Cada builder es una puerta (exit != 0 = NO APTO = rojo).
      - name: Paso 1b · todos los plugins re-homed construyen APTO (engine/núcleo consumidos por build)
        run: |
          set -e
          for b in tools/build_plugin_*.py; do
            echo "== $b =="
            uv run python "$b"
          done

      - name: Paso 2 · esquemas de contrato bien formados
        run: uv run --package aqyra-golden aqyra-golden --schema-only --golden-dir packages/golden

      - name: Paso 3 · golden C1 (VERDE/ROJO — Llave 1)
        run: uv run --package aqyra-golden aqyra-golden --golden-dir packages/golden

      # Hilo 3.1: el visor DENTRO de la Llave 1 (V3). tsc real filtrado a apps/** +
      # E2E headless sobre el derivado congelado del C4-FED-06 (identidad por md5,
      # D26) con la cámara BCF del viewpoint (D29). Sin golden de píxeles: se ancla
      # lo estructural. Los checks Python de los pasos 1–3 quedan intactos.
      - name: Instalar pnpm
        uses: pnpm/action-setup@v4
      - name: Node 22 (cache pnpm)
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Paso 4 · visor — install determinista (lockfile anclado)
        run: pnpm install --frozen-lockfile
      - name: Paso 5 · visor — build + typecheck + tests (E2E derivado + cámara BCF)
        # BUILD PRIMERO: `pnpm -r build` respeta el orden de dependencias del workspace
        # (p. ej. @aqyra/visor antes que @aqyra/shell), así los consumidores del visor
        # resuelven sus tipos desde el dist ya emitido (dist/ esta gitignorado y no viaja
        # en el checkout). Evita el TS2307 al typechear un paquete que importa a otro.
        run: |
          pnpm -r build
          pnpm -r typecheck
          pnpm -r test
