name: CI (Llave 1)

# Llave 1 — automática. En cada PR corre core + packs + golden + validación de esquemas.
# Rojo bloquea el merge (regla de protección de rama). El CI NUNCA certifica: la firma
# (Llave 2) es humana, en el flujo de release.
# NOTA DE GOBIERNO: el contexto requerido por la protección de main es el `name:` del job,
# que DEBE ser exactamente `gate`. No renombrar sin actualizar la protección de rama.
# El typecheck del visor se re-añadirá (con un tsc real y filtrado a apps/**) cuando exista
# el paquete del visor; hasta entonces no se gatea sobre algo que no existe.

on:
  pull_request:
  push:
    branches: [main]

# cancela runs viejos del mismo PR
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    name: gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # historia completa para el cálculo de "afectado"

      - name: Instalar uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sincronizar workspace
        run: uv sync --all-packages

      - name: Calcular objetivos afectados (informativo)
        run: uv run python tools/affected.py --base origin/${{ github.base_ref || 'main' }} || true

      - name: Paso 1 · núcleo (core) + packs + engine C1 — comportamiento, identidad y golden de pack
        run: uv run pytest packages/core packages/packs engines/ifc -q

      - name: Paso 1b · el plugin re-homed construye APTO (compilador consumido de engines/ifc)
        run: uv run python tools/build_plugin_iso19650.py

      - name: Paso 2 · esquemas de contrato bien formados
        run: uv run --package aqyra-golden aqyra-golden --schema-only --golden-dir packages/golden

      - name: Paso 3 · golden C1 (VERDE/ROJO — Llave 1)
        run: uv run --package aqyra-golden aqyra-golden --golden-dir packages/golden
