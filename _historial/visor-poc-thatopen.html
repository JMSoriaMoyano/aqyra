<script>
// Captura de errores globales -> a pantalla (sin necesidad de DevTools)
const logEl = document.getElementById("log");
function line(msg, cls){ const d=document.createElement("div"); if(cls)d.className=cls; d.textContent=msg; logEl.appendChild(d); logEl.scrollTop=logEl.scrollHeight; }
function info(msg, cls){ const i=document.getElementById("info"); i.textContent=msg; i.className=cls||""; }
line("· Diagnóstico iniciado. Si algo falla, el motivo aparecerá aquí.", "dim");
window.addEventListener("error", e=>{ line("ERROR JS: "+(e.message||e.error||e), "err"); if(e.filename) line("   en "+e.filename+":"+e.lineno, "dim"); });
window.addEventListener("unhandledrejection", e=>{ line("PROMESA RECHAZADA: "+(e.reason && (e.reason.message||e.reason)), "err"); });
</script>

const log = (m,c)=>{ const d=document.createElement("div"); if(c)d.className=c; d.textContent=m; document.getElementById("log").appendChild(d); document.getElementById("log").scrollTop=1e9; };
const info = (m,c)=>{ const i=document.getElementById("info"); i.textContent=m; i.className=c||""; };
function b64ToBytes(b64){ const bin=atob(b64); const a=new Uint8Array(bin.length); for(let i=0;i<bin.length;i++)a[i]=bin.charCodeAt(i); return a; }

(async ()=>{
  if(location.protocol === "file:"){
    log("⚠ Abierto como archivo local (file://). Chrome suele BLOQUEAR el worker de fragments aquí,", "warn");
    log("  así que el modelo puede quedarse en 'Cargando…'. Solución: servir por http (ver instrucciones).", "warn");
  }
  let THREE, OrbitControls, FRAGS;
  try{
    info("Cargando three.js…");
    log("→ import three…");
    THREE = await import("three");
    log("✓ three "+(THREE.REVISION||"?")+" cargado","ok");

    log("→ import OrbitControls…");
    ({ OrbitControls } = await import("three/examples/jsm/controls/OrbitControls.js"));
    log("✓ OrbitControls cargado","ok");

    log("→ import @thatopen/fragments (puede tardar varios segundos la 1ª vez)…");
    FRAGS = await import("@thatopen/fragments");
    log("✓ @thatopen/fragments cargado","ok");
  }catch(e){
    info("Fallo al cargar librerías del CDN", "err");
    log("✗ No se pudieron cargar los módulos: "+e.message, "err");
    log("  Causa habitual: sin conexión a internet, o un CDN bloqueado por red/proxy.", "warn");
    return;
  }

  try{
    info("Inicializando escena 3D…");
    const app=document.getElementById("app");
    const scene=new THREE.Scene(); scene.background=new THREE.Color(0x1e2330);
    const camera=new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.01, 5000); camera.position.set(8,8,8);
    const renderer=new THREE.WebGLRenderer({antialias:true}); renderer.setSize(innerWidth,innerHeight); renderer.setPixelRatio(devicePixelRatio); app.appendChild(renderer.domElement);
    const controls=new OrbitControls(camera, renderer.domElement); controls.enableDamping=true;
    scene.add(new THREE.GridHelper(40,40,0x44506a,0x2a3142)); scene.add(new THREE.AxesHelper(3));
    scene.add(new THREE.HemisphereLight(0xffffff,0x444466,1.1));
    const dir=new THREE.DirectionalLight(0xffffff,1.0); dir.position.set(10,20,10); scene.add(dir);
    addEventListener("resize", ()=>{ camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth,innerHeight); });
    log("✓ WebGL inicializado","ok");

    let fragments;
    (function animate(){ requestAnimationFrame(animate); controls.update(); if(fragments) fragments.update(); renderer.render(scene,camera); })();

    info("Descargando worker de fragments…");
    log("→ fetch worker.mjs…");
    const workerUrl="https://cdn.jsdelivr.net/npm/@thatopen/fragments@3.4.5/dist/Worker/worker.mjs";
    const resp=await fetch(workerUrl); if(!resp.ok) throw new Error("worker HTTP "+resp.status);
    const blob=await resp.blob();
    const worker=URL.createObjectURL(new File([blob],"worker.mjs",{type:"text/javascript"}));
    log("✓ worker descargado ("+(blob.size/1024|0)+" KB)","ok");

    info("Cargando modelo…");
    fragments=new FRAGS.FragmentsModels(worker);
    log("→ creando worker y cargando geometría…");
    const loadP = fragments.load(b64ToBytes(FRAG_B64), { modelId:"poc" });
    let resolved=false; loadP.then(()=>resolved=true);
    setTimeout(()=>{ if(!resolved){
      info("El worker no responde", "err");
      log("✗ load() no resolvió en 8 s: el worker de fragments no arrancó.", "err");
      log("  Causa casi segura: la página está como file://. Sírvela por http (ver más abajo).", "warn");
      log("  En la carpeta del proyecto:  python -m http.server 8000", "warn");
      log("  Y abre:  http://localhost:8000/visor-poc-thatopen.html", "warn");
    }}, 8000);
    const model=await loadP;
    if(model.useCamera) model.useCamera(camera);
    scene.add(model.object);
    await fragments.update(true);
    log("✓ modelo cargado en escena","ok");

    const box=new THREE.Box3().setFromObject(model.object);
    const size=box.getSize(new THREE.Vector3()).length()||10;
    const c=box.getCenter(new THREE.Vector3());
    controls.target.copy(c);
    camera.position.copy(c).add(new THREE.Vector3(1,0.8,1).multiplyScalar(size*0.7));
    camera.near=Math.max(size/100,0.001); camera.far=size*100; camera.updateProjectionMatrix(); controls.update();

    info("Modelo cargado ✓ — caso-R4","ok");
    log("✓ render OK","ok");
    if(size<=0.001) log("⚠ bbox vacío: geometría no visible (revisar).","warn");
    // Listado de clases (cosmético): getCategories/getItemsWithGeometry pueden ser asíncronos en modo multihilo
    try{
      let cats = model.getCategories?.();
      if(cats && typeof cats.then==="function") cats = await cats;
      cats = Array.isArray(cats) ? cats.filter(x=>/^IFC/.test(x)) : [];
      let geom = model.getItemsWithGeometry?.();
      if(geom && typeof geom.then==="function") geom = await geom;
      const n = Array.isArray(geom) ? geom.length : (geom?.size ?? "?");
      info("Modelo cargado ✓ — caso-R4 ("+n+" elementos)","ok");
      if(cats.length) log("Clases: "+cats.slice(0,8).join(", "),"ok");
    }catch(e){ log("(info de clases no disponible: "+e.message+")","dim"); }
  }catch(e){
    info("Error durante el render", "err");
    log("✗ "+e.message, "err");
    console.error(e);
  }
})();
</script>
