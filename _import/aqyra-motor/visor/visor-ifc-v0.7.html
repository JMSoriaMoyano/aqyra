<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Visor IFC v0.7 — navegación y filtrado avanzados (ThatOpen/fragments)</title>
<style>
  :root{color-scheme:dark}
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:#1e2330;font-family:system-ui,Segoe UI,sans-serif;color:#e8ecf4;overflow:hidden}
  #grid{position:fixed;inset:0;display:grid;grid-template-columns:340px 1fr 320px;grid-template-rows:46px 1fr}
  header{grid-column:1/4;display:flex;align-items:center;gap:10px;padding:0 14px;background:#161b27;border-bottom:1px solid #2a3142;z-index:20}
  header b{color:#7fd1ff}
  header .v{font-size:11px;opacity:.6}
  select,button,input{background:#222a3a;color:#e8ecf4;border:1px solid #38415a;border-radius:7px;padding:5px 9px;font-size:12px}
  button{cursor:pointer}
  select:hover,button:hover{border-color:#5a6a8c}
  input{outline:none}
  input:focus,select:focus{border-color:#5a6a8c}
  label.lbl{font-size:11px;opacity:.7}
  #left,#right{background:#171c28;overflow:auto;border-right:1px solid #2a3142}
  #right{border-right:none;border-left:1px solid #2a3142}
  #viewport{position:relative;background:#1e2330}
  #canvas-host{position:absolute;inset:0}
  .tabs{display:flex;border-bottom:1px solid #2a3142;position:sticky;top:0;background:#171c28;z-index:5}
  .tab{flex:1;text-align:center;padding:9px 2px;font-size:11.5px;cursor:pointer;color:#9fb0c8;border-bottom:2px solid transparent;white-space:nowrap}
  .tab.active{color:#7fd1ff;border-bottom-color:#7fd1ff}
  .pane{display:none;padding:8px 10px}
  .pane.active{display:block}
  .mdl{border:1px solid #28304a;border-radius:8px;margin:7px 2px;padding:7px 8px;background:#1a2030}
  .mdl-top{display:flex;align-items:center;gap:7px}
  .mdl-sw{width:13px;height:13px;border-radius:3px;border:1px solid #0006;flex:none}
  .mdl-name{flex:1;font-size:12.5px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .disc{font-size:10px;border-radius:6px;padding:1px 6px;color:#0c1018;font-weight:700;flex:none}
  .mdl-meta{font-size:10.5px;color:#8aa0c0;margin:3px 0 5px}
  .mdl-actions{display:flex;gap:5px;flex-wrap:wrap}
  .mdl-actions button{padding:3px 7px;font-size:11px}
  .mdl-actions button.on{background:#1d4666;border-color:#3a7bd5;color:#bfe6ff}
  .gctl{display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding:4px 2px 8px;border-bottom:1px solid #232b3b;margin-bottom:4px}
  .node{user-select:none}
  .node-row{display:flex;align-items:center;gap:5px;padding:2px 4px;border-radius:5px;cursor:pointer;font-size:12.5px;line-height:1.45;white-space:nowrap}
  .node-row:hover{background:#222a3a}
  .node-row.sel{background:#1d4666;color:#bfe6ff}
  .node-row.mroot{font-weight:700}
  .twisty{width:12px;display:inline-block;text-align:center;opacity:.6;flex:none}
  .cat{color:#8aa0c0;font-size:10.5px;flex:none}
  .nm{overflow:hidden;text-overflow:ellipsis;flex:1}
  .kids{margin-left:13px;border-left:1px solid #232b3b;padding-left:3px}
  .hidden{display:none}
  .rowacts{display:none;gap:3px;flex:none}
  .node-row:hover .rowacts,.cls-row:hover .rowacts{display:flex}
  .rowacts button{padding:0 5px;font-size:10.5px;line-height:17px;border-radius:5px}
  .cls-grp-h{font-size:11px;color:#9ad0ff;margin:9px 2px 3px;font-weight:700;display:flex;align-items:center;gap:6px}
  .cls-row{display:flex;align-items:center;gap:8px;padding:3px 4px;font-size:12.5px}
  .sw{width:14px;height:14px;border-radius:3px;border:1px solid #00000040;flex:none;cursor:pointer}
  .cls-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .cls-n{opacity:.55;font-size:11px;flex:none}
  .fctl{display:flex;flex-direction:column;gap:6px;padding:2px 2px 8px;border-bottom:1px solid #232b3b;margin-bottom:6px}
  .fctl .row{display:flex;gap:6px;align-items:center}
  .fctl input,.fctl select{flex:1;min-width:0}
  .fbtns{display:flex;gap:5px;flex-wrap:wrap}
  .fbtns button{flex:1}
  .res-bar{display:flex;gap:5px;flex-wrap:wrap;align-items:center;margin:2px 0 6px}
  .res-bar .cnt{font-size:11.5px;color:#9ad0ff;flex:1}
  .res-bar button{padding:3px 7px;font-size:11px}
  .res-row{display:flex;align-items:center;gap:6px;padding:3px 5px;border-radius:6px;cursor:pointer;font-size:12px;border:1px solid #1f2940;margin:3px 0;background:#1a2030}
  .res-row:hover{background:#222a3a;border-color:#33405e}
  .res-row .rn{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .res-row .rc{color:#8aa0c0;font-size:10px}
  .res-row.sel{background:#1d4666;border-color:#3a7bd5}
  .pl-modes{display:flex;gap:6px;margin:2px 2px 8px}
  .pl-modes button{flex:1;padding:5px;font-size:11.5px}
  .pl-modes button.on{background:#1d4666;border-color:#3a7bd5;color:#bfe6ff}
  .pl-row{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:7px;cursor:pointer;border:1px solid #1f2940;margin:4px 2px;background:#1a2030}
  .pl-row:hover{background:#222a3a;border-color:#33405e}
  .pl-row.on{background:#1d4666;border-color:#3a7bd5}
  .pl-cota{font-weight:700;font-size:13px;flex:none;min-width:74px}
  .pl-info{flex:1;font-size:11px;color:#9fb0c8;overflow:hidden}
  .pl-discs{display:flex;gap:3px;flex:none}
  .pl-d{width:11px;height:11px;border-radius:3px;border:1px solid #0006}
  #right h3{margin:10px 10px 4px;font-size:12px;color:#7fd1ff;text-transform:uppercase;letter-spacing:.04em}
  .selacts{display:flex;gap:5px;flex-wrap:wrap;padding:6px 10px 2px}
  .selacts button{padding:3px 8px;font-size:11px}
  .kv{display:grid;grid-template-columns:42% 58%;gap:1px 8px;padding:0 10px;font-size:12.5px}
  .kv .k{color:#9fb0c8;overflow:hidden;text-overflow:ellipsis}
  .kv .val{color:#e8ecf4;word-break:break-word}
  .pset{margin:6px 10px;background:#1b2230;border-left:2px solid #3a7bd5;border-radius:6px;padding:6px 8px}
  .pset .pname{font-size:11.5px;color:#9ad0ff;margin-bottom:3px;font-weight:600}
  .empty{padding:14px 12px;color:#7d8aa3;font-size:12.5px;line-height:1.5}
  .pill{display:inline-block;background:#243049;color:#9ad0ff;border-radius:10px;padding:1px 8px;font-size:11px;margin:2px 2px 0 0}
  #log{position:fixed;bottom:10px;left:352px;right:332px;max-height:30vh;overflow:auto;background:rgba(10,12,18,.93);padding:8px 12px;border-radius:9px;font:11.5px/1.5 ui-monospace,Consolas,monospace;white-space:pre-wrap;z-index:30;border:1px solid #2a3142}
  #log.hide{display:none}
  .ok{color:#8fe388}.err{color:#ff8a8a}.warn{color:#ffd479}.dim{opacity:.65}
  #toggleLog{position:fixed;bottom:10px;right:336px;z-index:31}
  .badge{font-size:10.5px;background:#2a3450;color:#9ad0ff;border-radius:6px;padding:2px 7px}
</style>
</head>
<body>
<div id="grid">
  <header>
    <b>Visor IFC</b><span class="v">v0.7 · navegación y filtrado</span>
    <span style="flex:1"></span>
    <span id="modelInfo" class="badge dim">cargando…</span>
    <label class="lbl">Color</label>
    <select id="colorMode" title="Modo de color del conjunto">
      <option value="original">Original</option>
      <option value="disciplina">Por disciplina</option>
      <option value="modelo">Por modelo</option>
    </select>
    <button id="showAllBtn" title="Mostrar todo (G)">Mostrar todo</button>
    <button id="fitAllBtn" title="Encuadrar todo (F)">Encuadrar todo</button>
  </header>

  <div id="left">
    <div class="tabs">
      <div class="tab active" data-pane="models">Modelos</div>
      <div class="tab" data-pane="tree">Árbol</div>
      <div class="tab" data-pane="classes">Clases</div>
      <div class="tab" data-pane="search">Buscar</div>
      <div class="tab" data-pane="plantas">Plantas</div>
    </div>
    <div id="pane-models" class="pane active"></div>
    <div id="pane-tree" class="pane"></div>
    <div id="pane-classes" class="pane"></div>
    <div id="pane-search" class="pane"></div>
    <div id="pane-plantas" class="pane"></div>
  </div>

  <div id="viewport">
    <div id="canvas-host"></div>
  </div>

  <div id="right">
    <div id="props"><div class="empty">Selecciona un elemento (clic en el modelo o en el árbol) para ver sus propiedades y Property Sets. La cabecera indica a qué disciplina/modelo pertenece.</div></div>
  </div>
</div>

<button id="toggleLog">Consola</button>
<div id="log" class="hide"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://esm.sh/three@0.184.0",
    "three/": "https://esm.sh/three@0.184.0/",
    "@thatopen/fragments": "https://esm.sh/@thatopen/fragments@3.4.5?external=three"
  }
}
</script>

<script type="module">
const $ = s => document.querySelector(s);
const logEl = $("#log");
const log = (m,c)=>{ const d=document.createElement("div"); if(c)d.className=c; d.textContent=m; logEl.appendChild(d); logEl.scrollTop=1e9; };
$("#toggleLog").onclick = ()=> logEl.classList.toggle("hide");
window.addEventListener("error", e=>{ logEl.classList.remove("hide"); log("ERROR JS: "+(e.message||e.error||e),"err"); });
window.addEventListener("unhandledrejection", e=>{ logEl.classList.remove("hide"); log("PROMESA RECHAZADA: "+(e.reason&&(e.reason.message||e.reason)),"err"); });

let THREE, OrbitControls, FRAGS;
let scene, camera, renderer, controls, host;
let fragments = null;
let manifest = null;
let DISC = {};
const LOADED = new Map();
let sel = null;
let colorMode = "original";
let CUR_RESULTS = [];
let plantaMode = "cota";
let activePlanta = null;
const SEL_COLOR = 0x00b3ff;
const FILTER_COLOR = 0xffd34d;
const PALETTE = [0x4e79a7,0xf28e2b,0x59a14f,0xe15759,0x76b7b2,0xedc948,0xb07aa1,0xff9da7,0x9c755f,0x86bcb6];
const hex = n => "#"+(n>>>0).toString(16).padStart(6,"0").slice(-6);
const num = s => typeof s==="number" ? s : parseInt(String(s).replace("#",""),16);
const esc = s => String(s==null?"":s).replace(/[<>&]/g,m=>({"<":"&lt;",">":"&gt;","&":"&amp;"}[m]));
const NUL = " ";
const discLabel = d => (DISC[d]||{label:d}).label;

async function loadLibs(){
  if(location.protocol==="file:"){ logEl.classList.remove("hide"); log("⚠ Abierto como file:// — el worker de fragments NO arranca aquí. Usa servir_visor.bat (http).","warn"); }
  log("→ cargando three / OrbitControls / fragments…","dim");
  THREE = await import("three");
  ({ OrbitControls } = await import("three/examples/jsm/controls/OrbitControls.js"));
  FRAGS = await import("@thatopen/fragments");
  log("✓ librerías cargadas (three "+THREE.REVISION+")","ok");
}

function initScene(){
  host = $("#canvas-host");
  scene = new THREE.Scene(); scene.background = new THREE.Color(0x1e2330);
  camera = new THREE.PerspectiveCamera(60, host.clientWidth/host.clientHeight, 0.01, 8000);
  camera.position.set(14,12,14);
  renderer = new THREE.WebGLRenderer({antialias:true});
  renderer.setSize(host.clientWidth, host.clientHeight); renderer.setPixelRatio(devicePixelRatio);
  host.appendChild(renderer.domElement);
  controls = new OrbitControls(camera, renderer.domElement); controls.enableDamping = true;
  scene.add(new THREE.GridHelper(60,60,0x44506a,0x2a3142));
  scene.add(new THREE.AxesHelper(3));
  scene.add(new THREE.HemisphereLight(0xffffff,0x444466,1.1));
  const dir = new THREE.DirectionalLight(0xffffff,1.0); dir.position.set(10,20,10); scene.add(dir);
  new ResizeObserver(()=>{ if(!host.clientWidth) return; camera.aspect=host.clientWidth/host.clientHeight; camera.updateProjectionMatrix(); renderer.setSize(host.clientWidth,host.clientHeight); }).observe(host);
  renderer.domElement.addEventListener("click", onPick);
  addEventListener("keydown", e=>{ if(e.target&&/^(INPUT|SELECT|TEXTAREA)$/.test(e.target.tagName)) return;
    if(e.key==="f"||e.key==="F") fitAll(); if(e.key==="g"||e.key==="G") showAllGlobal(); if(e.key==="Escape") clearSelection(); });
  (function animate(){ requestAnimationFrame(animate); controls.update(); if(fragments) fragments.update(); renderer.render(scene,camera); })();
  log("✓ escena 3D lista","ok");
}

let workerUrl = null;
async function getWorker(){
  if(workerUrl) return workerUrl;
  const url = "https://cdn.jsdelivr.net/npm/@thatopen/fragments@3.4.5/dist/Worker/worker.mjs";
  const resp = await fetch(url); if(!resp.ok) throw new Error("worker HTTP "+resp.status);
  const blob = await resp.blob();
  workerUrl = URL.createObjectURL(new File([blob],"worker.mjs",{type:"text/javascript"}));
  log("✓ worker de fragments descargado ("+(blob.size/1024|0)+" KB)","ok");
  return workerUrl;
}

async function loadModel(entry, color){
  log("→ "+entry.id+" · "+entry.props,"dim");
  const index = await (await fetch(entry.props)).json();
  const classToLocalIds = {};
  for(const it of Object.values(index.items)){
    if(it.localId==null) continue;
    (classToLocalIds[it.category] ||= []).push(it.localId);
  }
  const geomIds = (index.geometryLocalIds||[]).slice();
  let object=null;
  const ng = geomIds.length;
  if(ng>0){
    const bytes = new Uint8Array(await (await fetch(entry.frag)).arrayBuffer());
    let done=false; const p = fragments.load(bytes,{modelId:entry.id}); p.then(()=>done=true);
    setTimeout(()=>{ if(!done){ logEl.classList.remove("hide"); log("✗ "+entry.id+": load() no resolvió en 8 s (¿worker/file://?). Sirve por http.","err"); } },8000);
    object = await p;
    if(object.useCamera) object.useCamera(camera);
    scene.add(object.object);
  }
  const M = { entry, index, classToLocalIds, geomIds, geomSet:new Set(geomIds), object, color, disc: entry.disciplina, visible:true, isolated:false };
  M.storeys = collectStoreys(M);
  LOADED.set(entry.id, M);
  log("✓ "+entry.id+": "+index.stats.items+" ítems · "+ng+(ng?" con geometría":" (sólo datos)")+" · "+M.storeys.length+" plantas",(ng?"ok":"warn"));
  return M;
}

function collectStoreys(M){
  const res=[];
  function geomDesc(node, acc){
    if(node.localId!=null && M.geomSet.has(node.localId)) acc.push(node.localId);
    for(const c of (node.children||[])) geomDesc(c,acc);
  }
  function walk(node){
    if(node.category==="IFCBUILDINGSTOREY"){
      const acc=[]; geomDesc(node,acc);
      res.push({ modelId:M.entry.id, localId:node.localId, name:node.name||("#"+node.localId),
                 elevation:(node.elevation!=null?node.elevation:null), geomLocalIds:acc, disc:M.disc });
    }
    for(const c of (node.children||[])) walk(c);
  }
  if(M.index.tree) walk(M.index.tree);
  return res;
}

function boxOf(objects){
  const box = new THREE.Box3(); box.makeEmpty();
  let any=false;
  for(const o of objects){ const b=new THREE.Box3().setFromObject(o); if(!b.isEmpty()){ box.union(b); any=true; } }
  return any?box:null;
}
function frameBox(box){
  if(!box) return;
  const size = box.getSize(new THREE.Vector3()).length()||10;
  const c = box.getCenter(new THREE.Vector3());
  controls.target.copy(c);
  camera.position.copy(c).add(new THREE.Vector3(1,0.8,1).multiplyScalar(size*0.7));
  camera.near = Math.max(size/100,0.001); camera.far = size*100; camera.updateProjectionMatrix(); controls.update();
}
function fitAll(){
  const objs = [...LOADED.values()].filter(M=>M.object && M.visible).map(M=>M.object.object);
  const box = boxOf(objs);
  if(box) frameBox(box); else log("Sin geometría que encuadrar.","dim");
}
function fitModel(M){
  if(!M.object){ log(M.entry.id+": sin geometría.","dim"); return; }
  frameBox(boxOf([M.object.object]));
}
async function fitPairs(pairs){
  const box=new THREE.Box3(); box.makeEmpty(); let any=false;
  for(const [mid,ids] of groupByModel(pairs)){ const M=LOADED.get(mid); if(!M||!M.object) continue;
    try{ const boxes=await M.object.getBoxes(ids); for(const b of (boxes||[])){ if(b&&!b.isEmpty()){ box.union(b); any=true; } } }catch(_){}
  }
  if(any) frameBox(box);
}

function groupByModel(pairs){
  const m=new Map();
  for(const p of pairs){ if(!m.has(p.modelId)) m.set(p.modelId,[]); m.get(p.modelId).push(p.localId); }
  return m;
}
async function setPairsVisible(pairs, vis){
  for(const [mid,ids] of groupByModel(pairs)){
    const M=LOADED.get(mid); if(!M||!M.object) continue;
    const g=ids.filter(id=>M.geomSet.has(id));
    if(!g.length) continue;
    try{ await M.object.setVisible(g, vis); }catch(e){ log("vis: "+e.message,"dim"); }
  }
}
async function isolatePairs(pairs){
  for(const M of LOADED.values()){
    if(!M.object) continue;
    if(M.object.object) M.object.object.visible = true;
    M.visible = true; M.isolated = false;
    if(M.geomIds.length){ try{ await M.object.setVisible(M.geomIds, false); }catch(_){} }
  }
  await setPairsVisible(pairs, true);
  if(typeof refreshModelRows==="function") refreshModelRows();
  await fitPairs(pairs);
}
async function showAllGlobal(){
  for(const M of LOADED.values()){
    if(!M.object) continue;
    if(M.object.object) M.object.object.visible = true;
    M.visible = true; M.isolated = false;
    if(M.geomIds.length){ try{ await M.object.setVisible(M.geomIds, true); }catch(_){} }
  }
  await clearAllColor();
  await applyColorMode(colorMode);
  activePlanta = null;
  if(typeof refreshModelRows==="function") refreshModelRows();
  markPlantaActive();
  log("✓ mostrar todo","dim");
}
async function clearAllColor(){
  for(const M of LOADED.values()){
    if(M.object && M.geomIds.length){ try{ if(colorMode==="original") await M.object.resetColor(M.geomIds); }catch(_){} }
  }
}

async function onPick(ev){
  const mouse = new THREE.Vector2(ev.clientX, ev.clientY);
  let best=null;
  for(const M of LOADED.values()){
    if(!M.object || !M.visible || !M.object.object.visible) continue;
    let r=null;
    try{ r = await M.object.raycast({ camera, mouse, dom: renderer.domElement }); }
    catch(e){}
    if(r && r.localId!=null){
      let d = (typeof r.distance==="number") ? r.distance
            : (r.point ? camera.position.distanceTo(new THREE.Vector3(r.point.x,r.point.y,r.point.z)) : Infinity);
      if(!best || d<best.d) best = { d, modelId:M.entry.id, localId:r.localId };
    }
  }
  if(best) selectItem(best.modelId, best.localId, {focus:false});
  else clearSelection();
}

async function selectItem(modelId, localId, opts={}){
  if(sel){ const PM=LOADED.get(sel.modelId); if(PM&&PM.object){ try{ await PM.object.resetHighlight([sel.localId]); }catch(_){} } }
  const M = LOADED.get(modelId);
  sel = { modelId, localId };
  if(M && M.object){
    try{ await M.object.highlight([localId], { color:new THREE.Color(SEL_COLOR), renderedFaces:FRAGS.RenderedFaces.TWO, opacity:1, transparent:false }); }
    catch(e){ log("highlight: "+e.message,"dim"); }
  }
  showProps(M, localId);
  markTreeSelection(modelId, localId);
  markResultSelection(modelId, localId);
  if(opts.focus) focusItem(M, localId);
}

async function clearSelection(){
  if(sel){ const M=LOADED.get(sel.modelId); if(M&&M.object){ try{ await M.object.resetHighlight([sel.localId]); }catch(_){} } }
  sel = null;
  markTreeSelection(null,null);
  markResultSelection(null,null);
}

async function focusItem(M, localId){
  if(!M||!M.object) return;
  try{
    const boxes = await M.object.getBoxes([localId]);
    if(boxes && boxes[0] && !boxes[0].isEmpty()){
      const b=boxes[0], c=b.getCenter(new THREE.Vector3()), s=b.getSize(new THREE.Vector3()).length()||2;
      controls.target.copy(c);
      camera.position.copy(c).add(new THREE.Vector3(1,0.8,1).multiplyScalar(Math.max(s*1.8,2)));
      controls.update();
    }
  }catch(_){}
}

function showProps(M, localId){
  const el = $("#props");
  if(!M){ el.innerHTML = '<div class="empty">Sin modelo para #'+localId+'.</div>'; return; }
  const index = M.index;
  const guid = (index.localIdToGuid||{})[localId];
  const it = guid ? index.items[guid] : Object.values(index.items).find(x=>x.localId===localId);
  if(!it){ el.innerHTML = '<div class="empty">Sin datos para el elemento #'+localId+'.</div>'; return; }
  const dcfg = DISC[M.disc] || {label:M.disc,color:"#888"};
  let h = "";
  h += '<div class="selacts">';
  h += '<button id="selIso">Aislar</button><button id="selHide">Ocultar</button><button id="selShow">Mostrar</button><button id="selFit">Encuadrar</button>';
  h += '</div>';
  h += '<h3>Modelo</h3><div class="kv">';
  h += '<div class="k">Disciplina</div><div class="val"><span class="disc" style="background:'+dcfg.color+'">'+esc(dcfg.label)+'</span></div>';
  h += '<div class="k">Modelo</div><div class="val">'+esc(M.entry.label)+'</div>';
  h += '</div>';
  h += '<h3>Elemento</h3><div class="kv">';
  h += '<div class="k">Clase</div><div class="val"><span class="pill">'+esc(it.category)+'</span></div>';
  h += '<div class="k">Nombre</div><div class="val">'+esc(it.name||"—")+'</div>';
  h += '<div class="k">GlobalId</div><div class="val" style="font-family:ui-monospace,Consolas,monospace;font-size:11.5px">'+esc(guid||"—")+'</div>';
  h += '</div>';
  const attrs = it.attributes||{};
  const shown = Object.entries(attrs).filter(([k])=>!/^_/.test(k) && k!=="Name");
  if(shown.length){
    h += '<h3>Atributos</h3><div class="kv">';
    for(const [k,v] of shown) h += '<div class="k">'+esc(k)+'</div><div class="val">'+esc(v)+'</div>';
    h += '</div>';
  }
  const psets = it.psets||{};
  const pk = Object.keys(psets);

    h += '<h3>Property Sets</h3>';
    for(const pn of pk){
      h += '<div class="pset"><div class="pname">'+esc(pn)+'</div><div class="kv">';

      h += '</div></div>';
    }
  } else h += '<div class="empty" style="padding-top:6px">Sin Property Sets.</div>';

  $("#selHide").onclick = ()=> setPairsVisible(pair, false);

function toggleIsolate(M){

  for(const X of LOADED.values()){ X.isolated=false; setModelVisible(X, wasIso ? true : (X===M), false); }
  M.isolated = !wasIso;

}

async function applyColorMode(mode){
  colorMode = mode;

    if(!M.object || !M.geomIds.length) continue;

      if(mode==="original"){ await M.object.resetColor(M.geomIds); }
      else{
        const c = mode==="disciplina" ? num((DISC[M.disc]||{}).color||"#888") : M.color;
        await M.object.setColor(M.geomIds, new THREE.Color(c));

function nodeGeomPairs(M, node){
  const acc=[];
  (function w(n){ if(n.localId!=null && M.geomSet.has(n.localId)) acc.push({modelId:M.entry.id, localId:n.localId}); for(const c of (n.children||[])) w(c); })(node);
  return acc;
}
function nodeActions(M, node){
  const acts = document.createElement("span"); acts.className="rowacts";
  const mk=(t,title,fn)=>{ const b=document.createElement("button"); b.textContent=t; b.title=title; b.onclick=e=>{ e.stopPropagation(); fn(); }; return b; };
  acts.append(
    mk("◎","Aislar este nodo",()=>{ const p=nodeGeomPairs(M,node); if(p.length) isolatePairs(p); else log("Nodo sin geometría.","dim"); }),
    mk("⦸","Ocultar este nodo",()=>setPairsVisible(nodeGeomPairs(M,node),false)),
    mk("◉","Mostrar este nodo",()=>setPairsVisible(nodeGeomPairs(M,node),true))
  );
  return acts;
}
function renderNode(M, node, open){
  const wrap = document.createElement("div"); wrap.className="node";
  const row = document.createElement("div"); row.className="node-row";
  const hasKids = node.children && node.children.length;
  const tw = document.createElement("span"); tw.className="twisty"; tw.textContent = hasKids ? (open?"▾":"▸") : "·";
  const cat = document.createElement("span"); cat.className="cat"; cat.textContent=(node.category||"").replace(/^IFC/,"");
  let nmTxt = node.name || (node.localId!=null?("#"+node.localId):"");
  if(node.category==="IFCBUILDINGSTOREY" && node.elevation!=null){ const ev=Number(node.elevation); nmTxt += "  ("+(ev>=0?"+":"")+ev.toFixed(2)+" m)"; }
  const nm = document.createElement("span"); nm.className="nm"; nm.textContent = nmTxt;
  const acts = nodeActions(M, node);
  row.append(tw,cat,nm,acts);
  let kids=null;
  if(hasKids){
    kids = document.createElement("div"); kids.className="kids"+(open?"":" hidden");
    for(const c of node.children) kids.appendChild(renderNode(M,c,false));
    tw.onclick=e=>{ e.stopPropagation(); const h=kids.classList.toggle("hidden"); tw.textContent=h?"▸":"▾"; };
  }
  if(node.localId!=null){
    treeRowByKey.set(M.entry.id+":"+node.localId, row);
    row.onclick=()=>selectItem(M.entry.id, node.localId, {focus:true});
  }
  wrap.appendChild(row); if(kids) wrap.appendChild(kids);
  return wrap;
}

function fieldValue(M, it, field){
  if(field==="__cat") return it.category;
  if(field==="__disc") return discLabel(M.disc);
  if(field==="__name") return it.name;
  if(field.startsWith("attr:")) return (it.attributes||{})[field.slice(5)];
  if(field.startsWith("pset:")){ const [pn,pk]=field.slice(5).split(NUL); return (it.psets||{})[pn]?.[pk]; }
  return undefined;
}
function searchableText(M, it){
  let s = (it.category||"")+" "+(it.name||"")+" "+discLabel(M.disc);
  for(const [k,v] of Object.entries(it.attributes||{})){ if(/^_/.test(k)) continue; s += " "+v; }
  for(const props of Object.values(it.psets||{})) for(const v of Object.values(props)) s += " "+v;
  return s.toLowerCase();
}
function distinctValues(field){
  const set=new Set();
  for(const M of LOADED.values()) for(const it of Object.values(M.index.items)){
    if(it.localId==null) continue;
    const v=fieldValue(M,it,field);
    if(v!=null && v!=="") set.add(String(v));
  }
  return [...set].sort((a,b)=> a.localeCompare(b,undefined,{numeric:true}));
}
function buildSearchPane(){
  const host = $("#pane-search"); host.innerHTML="";
  const attrKeys=new Set(), psetFields=new Set();
  for(const M of LOADED.values()) for(const it of Object.values(M.index.items)){
    if(it.localId==null) continue;
    for(const k of Object.keys(it.attributes||{})) if(!/^_/.test(k) && k!=="Name") attrKeys.add(k);
    for(const [pn,props] of Object.entries(it.psets||{})) for(const pk of Object.keys(props)) psetFields.add(pn+NUL+pk);
  }
  const c = document.createElement("div"); c.className="fctl";
  c.innerHTML =
    '<div class="row"><input id="fText" type="text" placeholder="texto libre (nombre, clase, valores…)"/></div>'+
    '<div class="row"><select id="fField"></select></div>'+
    '<div class="row"><select id="fOp"><option value="eq">es igual a</option><option value="contains">contiene</option></select>'+
    '<select id="fVal"></select></div>'+
    '<div class="row"><input id="fValText" type="text" placeholder="…o valor a mano"/></div>'+
    '<div class="fbtns"><button id="fRun">Filtrar</button><button id="fClear">Limpiar</button></div>';
  host.appendChild(c);
  const sf = $("#fField");
  const opt=(v,t)=>{ const o=document.createElement("option"); o.value=v; o.textContent=t; return o; };
  sf.appendChild(opt("__any","— cualquier propiedad —"));
  sf.appendChild(opt("__cat","Clase (category)"));
  sf.appendChild(opt("__disc","Disciplina"));
  [...attrKeys].sort().forEach(k=> sf.appendChild(opt("attr:"+k, "Atributo · "+k)));
  [...psetFields].sort().forEach(k=>{ const [pn,pk]=k.split(NUL); sf.appendChild(opt("pset:"+k, "Pset · "+pn+" ▸ "+pk)); });
  function refreshVals(){
    const fv=$("#fVal"); fv.innerHTML="";
    const f=sf.value;
    fv.appendChild(opt("","— cualquier valor —"));
    if(f && f!=="__any"){ for(const v of distinctValues(f)) fv.appendChild(opt(v,v)); }
  }
  sf.onchange=refreshVals; refreshVals();
  $("#fRun").onclick=runFilter;
  $("#fClear").onclick=()=>{ $("#fText").value=""; $("#fValText").value=""; sf.value="__any"; refreshVals(); CUR_RESULTS=[]; renderResults(); clearAllColor().then(()=>applyColorMode(colorMode)); };
  const bar = document.createElement("div"); bar.id="resBar"; host.appendChild(bar);
  const list = document.createElement("div"); list.id="resList"; host.appendChild(list);
  renderResults();
}
function runFilter(){
  const text=($("#fText").value||"").trim().toLowerCase();
  const field=$("#fField").value;
  const op=$("#fOp").value;
  const value=$("#fVal").value;
  const valText=($("#fValText").value||"").trim().toLowerCase();
  const out=[];
  for(const M of LOADED.values()){
    for(const it of Object.values(M.index.items)){
      if(it.localId==null) continue;
      if(text && !searchableText(M,it).includes(text)) continue;
      if(field && field!=="__any"){
        const fv=fieldValue(M,it,field);
        const want = value!=="" ? value.toLowerCase() : valText;
        if(want){
          if(fv==null) continue;
          const fvs=String(fv).toLowerCase();
          if(op==="contains"){ if(!fvs.includes(want)) continue; }
          else { if(fvs!==want) continue; }
        } else {
          if(fv==null || fv==="") continue;
        }
      }
      out.push({modelId:M.entry.id, localId:it.localId, it, M});
    }
  }
  CUR_RESULTS=out;
  renderResults();
  log("Filtro: "+out.length+" resultados","dim");
}
function renderResults(){
  const bar=$("#resBar"), list=$("#resList");
  if(!bar||!list) return;
  const n=CUR_RESULTS.length;
  const nGeom=CUR_RESULTS.filter(r=>r.M.geomSet.has(r.localId)).length;
  bar.className="res-bar";
  bar.innerHTML='<span class="cnt">'+n+' resultado'+(n===1?"":"s")+(n?(' · '+nGeom+' con geometría'):"")+'</span>';
  if(n){
    const mkb=(id,t)=>{ const b=document.createElement("button"); b.id=id; b.textContent=t; return b; };
    bar.append(mkb("rIso","Aislar"), mkb("rCol","Colorear"), mkb("rHide","Ocultar"));
    const geomPairs=()=>CUR_RESULTS.filter(r=>r.M.geomSet.has(r.localId)).map(r=>({modelId:r.modelId, localId:r.localId}));
    setTimeout(()=>{
      const i=$("#rIso"), c=$("#rCol"), h=$("#rHide");
      if(i) i.onclick=()=>{ const p=geomPairs(); if(p.length) isolatePairs(p); else log("Resultados sin geometría.","dim"); };
      if(c) c.onclick=()=>colorResults();
      if(h) h.onclick=()=>setPairsVisible(geomPairs(),false);
    },0);
  }
  list.innerHTML="";
  if(!n){ list.innerHTML='<div class="empty">Sin resultados. Escribe un texto, o elige una propiedad y un valor, y pulsa Filtrar.</div>'; return; }
  const MAX=400;
  CUR_RESULTS.slice(0,MAX).forEach(r=>{
    const dcfg=DISC[r.M.disc]||{label:r.M.disc,color:"#888"};
    const row=document.createElement("div"); row.className="res-row"; row.dataset.k=r.modelId+":"+r.localId;
    const db=document.createElement("span"); db.className="disc"; db.style.background=dcfg.color; db.textContent=dcfg.label;
    const tx=document.createElement("span"); tx.className="rn";
    tx.innerHTML='<b>'+esc(r.it.name||("#"+r.localId))+'</b> <span class="rc">'+esc((r.it.category||"").replace(/^IFC/,""))+' · '+esc(r.M.entry.label)+'</span>';
    row.append(db,tx);
    row.onclick=()=>selectItem(r.modelId, r.localId, {focus:true});
    list.appendChild(row);
  });
  if(n>MAX){ const e=document.createElement("div"); e.className="empty"; e.textContent="… y "+(n-MAX)+" más (acota el filtro)."; list.appendChild(e); }
}
function markResultSelection(modelId, localId){

  if(modelId==null) return;
  const r=document.querySelector('#resList .res-row[data-k="'+modelId+':'+localId+'"]');

async function colorResults(){
  const byModel=groupByModel(CUR_RESULTS.map(r=>({modelId:r.modelId,localId:r.localId})));

function allStoreys(){
  const res=[];
  for(const M of LOADED.values()) for(const s of (M.storeys||[])) res.push(s);
  return res;
}
function renderPlantas(){
  const list=$("#plList"); if(!list) return;
  document.querySelectorAll(".pl-modes button").forEach(b=>b.classList.toggle("on", b.dataset.m===plantaMode));
  list.innerHTML="";
  const storeys=allStoreys().filter(s=>s.geomLocalIds.length>0);
  if(!storeys.length){ list.innerHTML='<div class="empty">No hay plantas con geometría en la federación.</div>'; return; }
  let entries=[];
  if(plantaMode==="cota"){
    const byElev=new Map();
    for(const s of storeys){
      const key=(s.elevation==null)?"s/c":Number(s.elevation).toFixed(2);
      if(!byElev.has(key)) byElev.set(key,[]);
      byElev.get(key).push(s);
    }
    entries=[...byElev.entries()].map(([key,arr])=>{
      const elev = key==="s/c"?null:parseFloat(key);
      return { key:"cota:"+key, elev, storeys:arr,
               pairs:arr.flatMap(s=>s.geomLocalIds.map(id=>({modelId:s.modelId,localId:id}))) };
    }).sort((a,b)=> (b.elev==null?-1e9:b.elev)-(a.elev==null?-1e9:a.elev));
  } else {
    entries=storeys.map(s=>({ key:"pl:"+s.modelId+":"+s.localId, elev:s.elevation, storeys:[s],
               pairs:s.geomLocalIds.map(id=>({modelId:s.modelId,localId:id})) }))
               .sort((a,b)=> (b.elev==null?-1e9:b.elev)-(a.elev==null?-1e9:a.elev));
  }
  for(const e of entries){
    const row=document.createElement("div"); row.className="pl-row"; row.dataset.k=e.key;
    if(e.key===activePlanta) row.classList.add("on");
    const cota=document.createElement("div"); cota.className="pl-cota";
    cota.textContent = e.elev==null ? "s/cota" : ((e.elev>=0?"+":"")+e.elev.toFixed(2)+" m");
    const info=document.createElement("div"); info.className="pl-info";
    if(plantaMode==="cota"){
      const names=[...new Set(e.storeys.map(s=>s.name))].join(" · ");
      info.textContent = names + "  ("+e.pairs.length+" elem.)";
    } else {
      const s=e.storeys[0];
      info.innerHTML = esc(s.name)+' <span class="rc" style="color:#8aa0c0;font-size:10px">'+esc(LOADED.get(s.modelId).entry.label)+'</span>  ('+e.pairs.length+" elem.)";
    }
    const discs=document.createElement("div"); discs.className="pl-discs";
    for(const d of [...new Set(e.storeys.map(s=>s.disc))]){ const sw=document.createElement("div"); sw.className="pl-d"; sw.style.background=(DISC[d]||{color:"#888"}).color; sw.title=discLabel(d); discs.appendChild(sw); }
    row.append(cota,info,discs);
    row.onclick=()=>{ activePlanta=e.key; markPlantaActive(); isolatePairs(e.pairs); };
    list.appendChild(row);
  }
}
function markPlantaActive(){
  document.querySelectorAll("#plList .pl-row").forEach(r=>r.classList.toggle("on", r.dataset.k===activePlanta));
}

document.querySelectorAll(".tab").forEach(t=>{
  t.onclick = ()=>{
    document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
    document.querySelectorAll(".pane").forEach(x=>x.classList.remove("active"));
    t.classList.add("active");
    $("#pane-"+t.dataset.pane).classList.add("active");
  };
});

async function main(){
  try{ await loadLibs(); }catch(e){ logEl.classList.remove("hide"); log("✗ No se pudieron cargar las librerías (¿sin internet / CDN bloqueado?): "+e.message,"err"); return; }
  initScene();

  try{ manifest = await (await fetch("models/manifest.json")).json(); }
  catch(e){ log("✗ No se pudo leer models/manifest.json: "+e.message,"err"); return; }
  let models;
  if(Array.isArray(manifest)){ models = manifest.map(m=>({...m, disciplina:m.disciplina||"estructura", load:true})); DISC={}; }
  else { models = manifest.models||[]; DISC = manifest.disciplinas||{}; }
  let di=0; for(const k of new Set(models.map(m=>m.disciplina))){ if(!DISC[k]) DISC[k]={label:k,color:hex(PALETTE[di++%PALETTE.length])}; }

  const toLoad = models.filter(m=>m.load!==false);
  $("#modelInfo").textContent = "cargando "+toLoad.length+" modelos…";
  fragments = new FRAGS.FragmentsModels(await getWorker());

  let i=0;
  for(const entry of toLoad){
    try{ await loadModel(entry, PALETTE[i%PALETTE.length]); }
    catch(e){ log("✗ "+entry.id+": "+e.message,"err"); }
    i++;
  }
  if(fragments) await fragments.update(true);

  buildModelsPanel(); buildTree(); buildClasses(); buildSearchPane(); buildPlantasPane();

  const totItems = [...LOADED.values()].reduce((a,M)=>a+Object.keys(M.index.items).length,0);
  const totGeom  = [...LOADED.values()].reduce((a,M)=>a+M.geomIds.length,0);
  const totPl    = [...LOADED.values()].reduce((a,M)=>a+(M.storeys?M.storeys.length:0),0);
  $("#modelInfo").textContent = LOADED.size+" modelos · "+totItems+" ítems · "+totGeom+" geom · "+totPl+" plantas";

  $("#fitAllBtn").onclick = fitAll;
  $("#showAllBtn").onclick = showAllGlobal;
  $("#colorMode").onchange = (e)=> applyColorMode(e.target.value).catch(err=>log("color: "+err.message,"dim"));

  fitAll();
  log("✓ federación cargada: "+[...LOADED.values()].map(M=>M.entry.id).join(", "),"ok");
}
main();
</script>
</body>
