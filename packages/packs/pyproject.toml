[project]
name = "aqyra-packs"
version = "0.1.0"
description = "Cargador de packs versionados (data/packs) — conocimiento externo que consumen los engines."
requires-python = ">=3.10"
dependencies = [
  "jsonschema>=4.18",
  "tomli>=2 ; python_version < '3.11'",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/aqyra_packs"]
