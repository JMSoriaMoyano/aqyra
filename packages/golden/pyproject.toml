[project]
name = "aqyra-golden"
version = "0.0.0"
description = "Corpus golden (C6) + runner + gate (Llave 1) del monorepo Aqyra."
requires-python = ">=3.10"
dependencies = [
  "jsonschema>=4.18",
  "ifcopenshell>=0.7",
]

[project.scripts]
aqyra-golden = "aqyra_golden.run_golden:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/aqyra_golden"]
