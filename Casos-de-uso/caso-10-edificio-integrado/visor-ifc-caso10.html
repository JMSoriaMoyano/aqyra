<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Visor IFC — v0.4</title>
<style>
  :root{ --bg:#1e2228; --panel:#262b33; --ink:#e7ebf0; --muted:#9aa4b2; --accent:#4c8bf5; --line:#39404a; }
  *{box-sizing:border-box} html,body{margin:0;height:100%;font-family:system-ui,Segoe UI,Roboto,sans-serif;background:var(--bg);color:var(--ink)}
  #app{display:grid;grid-template-columns:280px 1fr 320px;grid-template-rows:48px 1fr;height:100%}
  header{grid-column:1/4;display:flex;align-items:center;gap:10px;padding:0 12px;background:var(--panel);border-bottom:1px solid var(--line)}
  header h1{font-size:14px;margin:0;font-weight:600}
  header .sp{flex:1}
  button,label.btn{background:#313842;color:var(--ink);border:1px solid var(--line);border-radius:6px;padding:6px 10px;font-size:12px;cursor:pointer}
  button:hover,label.btn:hover{border-color:var(--accent)}
  aside{background:var(--panel);overflow:auto;padding:10px}
  aside.left{border-right:1px solid var(--line)} aside.right{border-left:1px solid var(--line)}
  h2{font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin:4px 0 8px}
  #viewer{position:relative}
  #viewer canvas{display:block}
  #drop{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:14px;pointer-events:none;text-align:center;padding:24px}
  #status{position:absolute;left:10px;bottom:10px;font-size:12px;color:var(--muted);background:rgba(0,0,0,.4);padding:4px 8px;border-radius:6px;max-width:80%}
  .tree,.tree ul{list-style:none;margin:0;padding-left:14px}
  .tree li{margin:2px 0;font-size:12px;line-height:1.5;cursor:pointer;white-space:nowrap}
  .tree li:hover>span{color:var(--accent)}
  .cat{display:flex;align-items:center;gap:8px;font-size:12px;margin:3px 0}
  .swatch{width:12px;height:12px;border-radius:3px;border:1px solid #0006}
  table{width:100%;border-collapse:collapse;font-size:12px} td{padding:3px 6px;border-bottom:1px solid var(--line);vertical-align:top} td.k{color:var(--muted);width:45%}
  .pset{margin:8px 0 4px;font-weight:600;font-size:12px;color:var(--accent)}
  .err{color:#ff8a8a;white-space:pre-wrap}
</style>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.149.0/build/three.module.js",
    "three/examples/jsm/controls/OrbitControls": "https://cdn.jsdelivr.net/npm/three@0.149.0/examples/jsm/controls/OrbitControls.js",
    "web-ifc": "https://cdn.jsdelivr.net/npm/web-ifc@0.0.57/web-ifc-api.js"
  }
}
</script>
</head>
<body>
<div id="app">
  <header>
    <h1>Visor IFC <span style="color:var(--muted);font-weight:400">v0.4</span></h1>
    <label class="btn">Abrir IFC<input id="file" type="file" accept=".ifc" hidden></label>
    <button id="fit">Encuadrar</button>
    <button id="colorBy">Color por clase</button>
    <button id="reset">Reset color</button>
    <button id="rotX" title="Girar 90° sobre X (mundo)">Girar X</button>
    <button id="rotZ" title="Girar 90° sobre Z (mundo)">Girar Z</button>
    <span class="sp"></span>
    <span id="meta" style="color:var(--muted);font-size:12px"></span>
  </header>
  <aside class="left">
    <h2>Estructura espacial</h2>
    <ul id="tree" class="tree"></ul>
    <h2 style="margin-top:14px">Clases / visibilidad</h2>
    <div id="cats"></div>
  </aside>
  <div id="viewer">
    <div id="drop">Arrastra aquí un .ifc<br>o usa «Abrir IFC»</div>
    <div id="status"></div>
  </div>
  <aside class="right">
    <h2>Propiedades</h2>
    <div id="props"><span style="color:var(--muted);font-size:12px">Doble clic en un objeto.</span></div>
  </aside>
</div>

<script type="module">
import { Scene, PerspectiveCamera, WebGLRenderer, Color, AmbientLight, DirectionalLight, HemisphereLight,
         GridHelper, AxesHelper, Raycaster, Vector2, Box3, Vector3, Group, Mesh, BufferGeometry,
         BufferAttribute, Matrix4, MeshLambertMaterial, DoubleSide } from "three";
import { OrbitControls } from "three/examples/jsm/controls/OrbitControls";
import * as WebIFC from "web-ifc";

const WASM="https://cdn.jsdelivr.net/npm/web-ifc@0.0.57/";
const elViewer=document.getElementById("viewer");
const statusEl=document.getElementById("status");
const setStatus=(t,err=false)=>{ statusEl.innerHTML=err?`<span class="err">${t}</span>`:t; console.log("[visor]",t); };

// escena
const scene=new Scene(); scene.background=new Color(0x1e2228);
const camera=new PerspectiveCamera(60,1,0.1,100000); camera.position.set(20,20,20);
const renderer=new WebGLRenderer({antialias:true}); renderer.setPixelRatio(devicePixelRatio);
elViewer.appendChild(renderer.domElement);
scene.add(new AmbientLight(0xffffff,0.5));
scene.add(new HemisphereLight(0xffffff,0x222222,0.6));
const dir=new DirectionalLight(0xffffff,0.8); dir.position.set(1,2,1); scene.add(dir);
scene.add(new GridHelper(100,100,0x39404a,0x2a2f37));
scene.add(new AxesHelper(5));
const controls=new OrbitControls(camera,renderer.domElement); controls.enableDamping=true;
function resize(){ const w=elViewer.clientWidth,h=elViewer.clientHeight; renderer.setSize(w,h); camera.aspect=w/h; camera.updateProjectionMatrix(); }
addEventListener("resize",resize); resize();
(function loop(){ controls.update(); renderer.render(scene,camera); requestAnimationFrame(loop); })();

// web-ifc
const ifcAPI=new WebIFC.IfcAPI();
let modelID=null, group=null;
const byId=new Map();     // expressID -> [meshes]
const byType=new Map();   // typeName -> {color, meshes, cb}
let selected=[];

async function init(){
  try{ ifcAPI.SetWasmPath(WASM,true); await ifcAPI.Init(); setStatus("Motor IFC listo. Abre un .ifc (doble clic = propiedades)."); }
  catch(e){ setStatus("No se pudo iniciar el motor IFC: "+e.message,true); }
}
init().then(()=>{
  if(window.__IFC_DATA__){
    try{ const b=Uint8Array.from(atob(window.__IFC_DATA__),c=>c.charCodeAt(0)); loadBuffer(b, window.__IFC_NAME__||"modelo.ifc"); }
    catch(e){ setStatus("No se pudo cargar el IFC incrustado: "+e.message,true); }
  }
});

function colorForIndex(i){ const c=new Color(); c.setHSL(((i*47)%360)/360,0.55,0.55); return c; }

async function loadFile(file){ const buf=new Uint8Array(await file.arrayBuffer()); return loadBuffer(buf,file.name); }
async function loadBuffer(buf,name){
  if(modelID!=null){ try{ifcAPI.CloseModel(modelID);}catch(_){} }
  if(group){ scene.remove(group); }
  byId.clear(); byType.clear(); selected=[];
  document.getElementById("drop").style.display="none";
  document.getElementById("meta").textContent=name;
  setStatus("Leyendo "+name+" …");
  try{
    modelID=ifcAPI.OpenModel(buf,{COORDINATE_TO_ORIGIN:true});
    setStatus("Generando geometría…");
    group=new Group(); // orientacion ajustable con los botones Girar X / Girar Z
    scene.add(group);
    let count=0;
    ifcAPI.StreamAllMeshes(modelID,(mesh)=>{
      const eid=mesh.expressID;
      let typeName="IFC";
      try{ typeName=ifcAPI.GetNameFromTypeCode(ifcAPI.GetLineType(modelID,eid)); }catch(_){}
      const geos=mesh.geometries;
      for(let i=0;i<geos.size();i++){
        const pg=geos.get(i);
        const g=ifcAPI.GetGeometry(modelID,pg.geometryExpressID);
        const v=ifcAPI.GetVertexArray(g.GetVertexData(),g.GetVertexDataSize());
        const ix=ifcAPI.GetIndexArray(g.GetIndexData(),g.GetIndexDataSize());
        const n=v.length/6;
        const pos=new Float32Array(n*3), nor=new Float32Array(n*3);
        for(let k=0;k<n;k++){ pos[k*3]=v[k*6];pos[k*3+1]=v[k*6+1];pos[k*3+2]=v[k*6+2];
                              nor[k*3]=v[k*6+3];nor[k*3+1]=v[k*6+4];nor[k*3+2]=v[k*6+5]; }
        const bg=new BufferGeometry();
        bg.setAttribute("position",new BufferAttribute(pos,3));
        bg.setAttribute("normal",new BufferAttribute(nor,3));
        bg.setIndex(new BufferAttribute(new Uint32Array(ix),1));
        const col=new Color(pg.color.x,pg.color.y,pg.color.z);
        const op=pg.color.w==null?1:pg.color.w;
        const mat=new MeshLambertMaterial({color:col,side:DoubleSide,transparent:op<1,opacity:op});
        const m=new Mesh(bg,mat); m.applyMatrix4(new Matrix4().fromArray(pg.flatTransformation));
        m.userData={expressID:eid,typeName,baseColor:col.getHex()};
        group.add(m);
        if(!byId.has(eid)) byId.set(eid,[]); byId.get(eid).push(m);
        if(!byType.has(typeName)) byType.set(typeName,{meshes:[]}); byType.get(typeName).meshes.push(m);
        g.delete(); count++;
      }
    });
    setStatus(`Modelo cargado (${count} geometrías, ${byId.size} objetos).`);
    fit(); buildCategories(); await buildTree();
  }catch(e){ setStatus("Error al cargar el IFC: "+e.message+"  (revisa la consola, F12)",true); console.error(e); }
}

function fit(){
  if(!group) return;
  const box=new Box3().setFromObject(group);
  if(box.isEmpty()){ setStatus("El modelo no generó geometría visible.",true); return; }
  const c=box.getCenter(new Vector3()), s=box.getSize(new Vector3());
  const r=Math.max(s.x,s.y,s.z)||10; controls.target.copy(c);
  camera.position.set(c.x+r,c.y+r,c.z+r); camera.near=r/1000; camera.far=r*1000; camera.updateProjectionMatrix();
}

// selección
const ray=new Raycaster(), mouse=new Vector2();
function clearSel(){ selected.forEach(m=>m.material.emissive&&m.material.emissive.setHex(0x000000)); selected=[]; }
renderer.domElement.addEventListener("dblclick",async(ev)=>{
  if(!group) return;
  const r=renderer.domElement.getBoundingClientRect();
  mouse.x=((ev.clientX-r.left)/r.width)*2-1; mouse.y=-((ev.clientY-r.top)/r.height)*2+1;
  ray.setFromCamera(mouse,camera);
  const hit=ray.intersectObjects(group.children,false)[0];
  if(!hit) return;
  const eid=hit.object.userData.expressID;
  clearSel();
  (byId.get(eid)||[]).forEach(m=>{ m.material.emissive&&m.material.emissive.setHex(0x224488); selected.push(m); });
  await showProps(eid);
});

async function showProps(eid){
  const box=document.getElementById("props");
  try{
    const p=await ifcAPI.properties.getItemProperties(modelID,eid,true);
    const psets=await ifcAPI.properties.getPropertySets(modelID,eid,true);
    const val=x=> x&&typeof x==="object" ? (x.value ?? "") : (x ?? "");
    let h=`<table><tr><td class="k">Clase</td><td>${ifcAPI.GetNameFromTypeCode(ifcAPI.GetLineType(modelID,eid))}</td></tr>`+
          `<tr><td class="k">Nombre</td><td>${val(p.Name)}</td></tr>`+
          `<tr><td class="k">GlobalId</td><td>${val(p.GlobalId)}</td></tr>`+
          `<tr><td class="k">ExpressID</td><td>${eid}</td></tr></table>`;
    for(const ps of psets||[]){
      h+=`<div class="pset">${val(ps.Name)}</div><table>`;
      for(const pr of ps.HasProperties||[]){ h+=`<tr><td class="k">${val(pr.Name)}</td><td>${val(pr.NominalValue)}</td></tr>`; }
      h+=`</table>`;
    }
    box.innerHTML=h;
  }catch(e){ box.innerHTML=`<span class="err">No se pudieron leer propiedades: ${e.message}</span>`; }
}

// árbol espacial
async function buildTree(){
  const ul=document.getElementById("tree"); ul.innerHTML="";
  let root; try{ root=await ifcAPI.properties.getSpatialStructure(modelID,false); }catch(e){ ul.innerHTML=`<span class="err">${e.message}</span>`; return; }
  const nameOf=id=>{ try{ const l=ifcAPI.GetLine(modelID,id,false); return l&&l.Name?(l.Name.value||""):""; }catch(_){ return ""; } };
  const render=(node,parent)=>{
    const li=document.createElement("li"); const span=document.createElement("span");
    const nm=nameOf(node.expressID);
    span.textContent=(node.type||"")+(nm?(" · "+nm):"");
    li.appendChild(span);
    li.addEventListener("click",async e=>{ e.stopPropagation(); clearSel();
      (byId.get(node.expressID)||[]).forEach(m=>{ m.material.emissive&&m.material.emissive.setHex(0x224488); selected.push(m); });
      await showProps(node.expressID); });
    parent.appendChild(li);
    if(node.children&&node.children.length){ const sub=document.createElement("ul"); li.appendChild(sub); node.children.forEach(c=>render(c,sub)); }
  };
  render(root,ul);
}

// categorías: visibilidad + color por clase
let colored=false;
function buildCategories(){
  const cats=document.getElementById("cats"); cats.innerHTML="";
  let i=0;
  for(const [type,info] of [...byType.entries()].sort((a,b)=>b[1].meshes.length-a[1].meshes.length)){
    info.color=colorForIndex(i++);
    const row=document.createElement("div"); row.className="cat";
    const cb=document.createElement("input"); cb.type="checkbox"; cb.checked=true;
    const sw=document.createElement("span"); sw.className="swatch"; sw.style.background=`#${info.color.getHexString()}`;
    const lab=document.createElement("span"); lab.textContent=`${type.replace(/^IFC/,"")} (${info.meshes.length})`;
    row.append(cb,sw,lab); cats.appendChild(row); info.cb=cb;
    cb.addEventListener("change",()=> info.meshes.forEach(m=> m.visible=cb.checked));
  }
}
document.getElementById("colorBy").addEventListener("click",()=>{ colored=true;
  for(const info of byType.values()) info.meshes.forEach(m=> m.material.color.copy(info.color)); });
document.getElementById("reset").addEventListener("click",()=>{ colored=false;
  for(const ms of byId.values()) ms.forEach(m=> m.material.color.setHex(m.userData.baseColor)); });
const AXIS_X=new Vector3(1,0,0), AXIS_Z=new Vector3(0,0,1);
document.getElementById("rotX").addEventListener("click",()=>{ if(group){ group.rotateOnWorldAxis(AXIS_X,-Math.PI/2); fit(); }});
document.getElementById("rotZ").addEventListener("click",()=>{ if(group){ group.rotateOnWorldAxis(AXIS_Z,-Math.PI/2); fit(); }});

// entradas
document.getElementById("file").addEventListener("change",e=>{ if(e.target.files[0]) loadFile(e.target.files[0]); });
document.getElementById("fit").addEventListener("click",fit);
elViewer.addEventListener("dragover",e=>e.preventDefault());
elViewer.addEventListener("drop",e=>{ e.preventDefault(); const f=[...e.dataTransfer.files].find(f=>f.name.toLowerCase().endsWith(".ifc")); if(f) loadFile(f); });
</script>
</body>
</html>
