# versions.lock — ancla la versión del ESQUEMA de contrato, del ENGINE y del PACK.
# Invariante (FUNDACION_C6 §3): un resultado solo es reproducible si se fija engine + pack.
# Fase 0: C1 (esquema) + core + un pack de ejemplo. El resto entra contract-first, por fase.
# Este fichero es la fuente de verdad que el CI lee. Se toca por PR (zona de gobierno).

[contracts.C1]
nombre          = "interoperabilidad"
schema_version  = "0.1.0"              # esquema formalizado (Fase 0)
engine          = "iso19650-openbim"
engine_version  = "0.10.0"             # firmado aguas arriba (Llave 2) — golden C1-APERTURA-01
golden          = "C1-APERTURA-01"
oraculo         = "conteo de entidades + round-trip"
estado          = "engine-importado"     # Fase I·h1: corte mínimo en engines/ifc; la golden compila con el engine real

# --- engine C1 (Fase I·h1): corte mínimo narración→IFC importado del canónico 0.10.0 ---
# Copiado BYTE A BYTE de _import/aqyra-motor (procedencia). Identidad vigilada por
# engines/ifc/tests/test_identidad_ifc.py (hash fijo) y test_espejo_ifc.py (vs procedencia).
# La firma 0.8.2 sigue intacta en _import/tag como record histórico; el engine vivo se ancla por md5.
[engines.ifc]
engine          = "iso19650-openbim"
engine_version  = "0.10.0"                   # aditivo sobre el tag firmado 0.8.2 (diff verificado)
tag_firmado     = "iso19650-openbim-v0.8.2"  # record histórico (firma GPG); NO es el engine vivo
origen          = "_import/aqyra-motor (narracion-ifc/ + iso19650-openbim/scripts/lineal/)"
corte           = "compile narración→IFC: compilar_spec+spec_to_ifc+clasificacion+catalogo_ifc+alineaciones_ifc+validar+spec.schema+construir_alineacion"
estado          = "importado (corte mínimo C1); espejo del ENGINE retirado (PR-E1): plugins/iso19650-openbim consume engines/ifc por build (tools/build_plugin_iso19650.py, 0.10.0); guardián test_no_reaparicion_espejo.py"

# md5 LF-normalizado de cada fichero del corte mínimo (== hashes de test_identidad_ifc).
[engines.ifc.md5]
"narracion-ifc/compilar_spec.py"             = "eff7e9c34ba633480738afd9b8ac3565"
"narracion-ifc/spec_to_ifc.py"               = "45284c396d37f1ee591abc9e2e7ded4f"
"narracion-ifc/clasificacion.py"             = "a5bc92893ed3db52475b14d481d83d2e"
"narracion-ifc/catalogo_ifc.py"              = "6aabeac4663da34dd00a95a0f4a7b228"
"narracion-ifc/catalogo-ifc4x3.json"         = "84840734f3ad19120dd67254b2d2c43f"
"narracion-ifc/alineaciones_ifc.py"          = "da20508e06cd54435e0691fa32508311"
"narracion-ifc/validar.py"                   = "c45940bfd69ffd9e2dd663319254aef4"
"narracion-ifc/spec.schema.json"             = "a1db77f5771de282719429fa4aad2596"
"scripts/lineal/generate_test_ifc_lineal.py" = "344f975b6e25a95dcce819c11f7089ad"

# --- core (0.5): núcleo compartido, extraído del canónico Nucleo-transversal ---
# No es un contrato; se ancla su procedencia e IDENTIDAD byte a byte (test_identidad_nucleo).
[core]
version         = "0.1.0"
origen          = "Estructurando/Nucleo-transversal/nucleo"
ifc_utils_md5   = "ad06f87d648fc0388b35d10deeb290b7"
grafo_red_md5   = "fe5dfebb4c5adb73f90718d57978e8a4"
estado          = "extraído (fin del espejo en el monorepo); retirada aguas arriba PENDIENTE (PR-E2…E5). La copia en plugins/iso19650-openbim/scripts/nucleo queda atada byte a byte al canónico por test_no_reaparicion_espejo.py"

# --- packs (0.6): conocimiento externo versionado. data/packs/<familia>/<id>/<version>/ ---
# Cambiar de pack es una decisión explícita: se re-ancla aquí y se actualiza su golden.
[packs.codigo]
id              = "EC-ES"
familia         = "codigos"
version         = "2021"
golden          = "identidad de contenido (hash)"
estado          = "esqueleto (subconjunto mínimo de coeficientes estándar)"
# [packs.banco]      id = "BEDEC"   version = "2026-Q1"   (0.6+, cuando C5 lo consuma)
# [packs.normativa]  id = "CTE"     version = "2019"      (cuando C3 lo consuma)
# [packs.ids]        id = "proyecto" version = "v3"       (cuando C4/C7 lo consuman)

# --- historia (0.7): importación de los 4 repos aguas arriba PRESERVANDO firmas ---
# Estrategia A: `git subtree add --prefix=_import/<repo>` conserva los SHA de los commits,
# de modo que los objetos firmados siguen intactos y sus tags GPG verifican en el monorepo.
# La zona firmada NO se reescribe; los 4 repos originales quedan archivados read-only.
[historia]
estrategia      = "subtree add (hashes preservados)"
clave_firma     = "EDDSA/ed25519 8FD1E413A02021DD3E7903CA7D59BA28515E0942 (JM Soria <jmsoria@ciccp.es>)"
backup          = "_backup-fase0.7-2026-07-01.tar.gz (4 espejos --mirror + MANIFIESTO-FIRMAS.txt)"

[historia.aqyra-motor]
