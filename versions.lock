[core]
version         = "0.1.0"
origen          = "Estructurando/Nucleo-transversal/nucleo"
ifc_utils_md5   = "ad06f87d648fc0388b35d10deeb290b7"
grafo_red_md5   = "fe5dfebb4c5adb73f90718d57978e8a4"
estado          = "extraído; espejo del NÚCLEO retirado del PILOTO (PR-E2), de INSTALACIONES (PR-E3), de OBRAS-LINEALES (PR-E4: inyección FACTORIZADA en tools/_inyectar_nucleo.py; gate con paso ÚNICO de builds tools/build_plugin_*.py), de PUENTES (PR-E5: FROZEN v0.6.0, primer caso invertido de procedencia) y de MOTOR-FEM (PR-E6: FROZEN v0.3.0, mismo precedente, ver packages/core/NUCLEO_PR-E6_decision.md). VACIADO DE ESPEJOS COMPLETO (Fase I): 0 plugins con copia trackeada; los 5 builders inyectan desde packages/core; guardián anti-reaparición en test_no_reaparicion_espejo.py cubre todos por nombre"

