# versions.lock — ancla la versión del ESQUEMA de contrato, del ENGINE y del PACK.
# Invariante (FUNDACION_C6 §3): un resultado solo es reproducible si se fija engine + pack.
# Fase 0: C1 (esquema) + core + un pack de ejemplo. El resto entra contract-first, por fase.
# Este fichero es la fuente de verdad que el CI lee. Se toca por PR (zona de gobierno).

[contracts.C1]
nombre          = "interoperabilidad"
schema_version  = "0.1.0"              # esquema formalizado (Fase 0)
engine          = "iso19650-openbim"
engine_version  = "0.10.0"             # firmado aguas arriba (Llave 2) — golden C1-APERTURA-01
golden          = "C1-APERTURA-01"
oraculo         = "conteo de entidades + round-trip"
estado          = "engine-importado"     # Fase I·h1: corte mínimo en engines/ifc; la golden compila con el engine real

# --- contrato C4 (Fase II·h1→h5): federación — contract-first COMPLETADO con el service ---
# Decisiones D1–D25 ancladas en packages/contracts/C4-federacion/DECISIONES.md (OK JM 2026-07-02).
# El Maestro autoritativo es el MANIFIESTO (D1); el IFC federado derivado NO se emite en v0 (D6).
# Motor IDS propio mínimo (D7); emisión BCF 3.0 HECHA en 1.2 (Fase II·h3, D11–D14).
# LECTURA ENDURECIDA para IFC sucio HECHA en 1.3 (Fase II·h4, D16–D20): tolerable →
# avisos_lectura en el informe; bloqueante → LecturaIfcError con diagnóstico.
# COBERTURA GOLDEN ADICIONAL en 1.4 (Fase II·h5, D21–D25): integración 1.2×1.3 (04) +
# mantener-separada IMPLEMENTADA (05 — en 0.3.0 se ecoaba sin aplicarse); prioridad RESERVADA (D24).
[contracts.C4]
nombre          = "federacion"
schema_version  = "0.1.0"              # 3 esquemas: reglas-federacion + maestro-manifiesto + informe-qa
engine          = "services/federacion"
engine_version  = "0.4.0"              # service v0.4 (Fase II·h5): mantener-separada real (D22) + cobertura 1.4
bcf             = "3.0"                # estándar buildingSMART, por referencia (no se re-esquematiza)
ids_pack        = "ids/proyecto-piloto/v1"
golden          = "C4-FED-01 + C4-FED-02 + C4-FED-03 + C4-FED-04 + C4-FED-05"
oraculo         = "recompute (federar+validar contra el MISMO expected, tolerancias del caso) + modo anclado íntegro del 2.1 — D10: más checks, nunca menos; C4-FED-02 añade la EMISIÓN: árbol BCF 3.0 anclado por md5 de fichero (D12) con GUIDs uuid5 deterministas (D13) y generación inyectada (bcf_generacion); C4-FED-03 añade el IFC SUCIO (D18-D19): camino feliz-degradado con avisos_lectura anclados en el expected; C4-FED-04 añade la INTEGRACIÓN 1.2×1.3 (D21/D23): mixto sucio+limpio con avisos POR MODELO + emisión + estados heterogéneos min(S) + transformación no trivial; C4-FED-05 añade mantener-separada (D22): nodos por modelo sin fundir"
estado          = "service v0.4 (cobertura golden adicional — tarea 1.4, Fase II·h5, D21–D25; mantener-separada implementada y anclada); IFC derivado = v0.x (D6)"

# --- engine C1 (Fase I·h1): corte mínimo narración→IFC importado del canónico 0.10.0 ---
# Copiado BYTE A BYTE de _import/aqyra-motor (procedencia). Identidad vigilada por
# engines/ifc/tests/test_identidad_ifc.py (hash fijo) y test_espejo_ifc.py (vs procedencia).
# La firma 0.8.2 sigue intacta en _import/tag como record histórico; el engine vivo se ancla por md5.
[engines.ifc]
engine          = "iso19650-openbim"
engine_version  = "0.10.0"                   # aditivo sobre el tag firmado 0.8.2 (diff verificado)
tag_firmado     = "iso19650-openbim-v0.8.2"  # record histórico (firma GPG); NO es el engine vivo
origen          = "_import/aqyra-motor (narracion-ifc/ + iso19650-openbim/scripts/lineal/)"
corte           = "compile narración→IFC: compilar_spec+spec_to_ifc+clasificacion+catalogo_ifc+alineaciones_ifc+validar+spec.schema+construir_alineacion"
estado          = "importado (corte mínimo C1); espejo del ENGINE retirado (PR-E1): plugins/iso19650-openbim consume engines/ifc por build (tools/build_plugin_iso19650.py, 0.10.0); guardián test_no_reaparicion_espejo.py"

