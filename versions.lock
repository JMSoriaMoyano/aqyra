# versions.lock — ancla la versión del ESQUEMA de contrato, del ENGINE y del PACK.
# Invariante (FUNDACION_C6 §3): un resultado solo es reproducible si se fija engine + pack.
# Fase 0: C1 (esquema) + core + un pack de ejemplo. El resto entra contract-first, por fase.
# Este fichero es la fuente de verdad que el CI lee. Se toca por PR (zona de gobierno).

[contracts.C1]
nombre          = "interoperabilidad"
schema_version  = "0.1.0"              # esquema formalizado (Fase 0)
engine          = "iso19650-openbim"
engine_version  = "0.10.0"             # firmado aguas arriba (Llave 2) — golden C1-APERTURA-01
golden          = "C1-APERTURA-01"
oraculo         = "conteo de entidades + round-trip"
estado          = "engine-importado"     # Fase I·h1: corte mínimo en engines/ifc; la golden compila con el engine real

# --- contrato C4 (Fase II·h1→h5): federación — contract-first COMPLETADO con el service ---
# Decisiones D1–D25 ancladas en packages/contracts/C4-federacion/DECISIONES.md (OK JM 2026-07-02).
# El Maestro autoritativo es el MANIFIESTO (D1); el IFC federado derivado NO se emite en v0 (D6).
# Motor IDS propio mínimo (D7); emisión BCF 3.0 HECHA en 1.2 (Fase II·h3, D11–D14).
# LECTURA ENDURECIDA para IFC sucio HECHA en 1.3 (Fase II·h4, D16–D20): tolerable →
# avisos_lectura en el informe; bloqueante → LecturaIfcError con diagnóstico.
# COBERTURA GOLDEN ADICIONAL en 1.4 (Fase II·h5, D21–D25): integración 1.2×1.3 (04) +
# mantener-separada IMPLEMENTADA (05 — en 0.3.0 se ecoaba sin aplicarse); prioridad RESERVADA (D24).
# IFC FEDERADO DERIVADO + CÁMARA BCF en v0.x (Fase II·h6, D26–D30): la decisión que D6 aplazó —
# derivar() escribe el .ifc federado (anclado por md5 BYTE A BYTE, cabecera SPF determinista) y
# emitir_bcf(derivado=) pone la CÁMARA perspectiva determinista en cada viewpoint (D29).
[contracts.C4]
nombre          = "federacion"
schema_version  = "0.1.0"              # 3 esquemas: reglas-federacion + maestro-manifiesto + informe-qa
engine          = "services/federacion"
engine_version  = "0.5.0"              # service v0.5 (Fase II·h6): derivar() + cámara BCF (D26–D30)
bcf             = "3.0"                # estándar buildingSMART, por referencia (no se re-esquematiza)
ids_pack        = "ids/proyecto-piloto/v1"
golden          = "C4-FED-01 + C4-FED-02 + C4-FED-03 + C4-FED-04 + C4-FED-05 + C4-FED-06"
oraculo         = "recompute (federar+validar contra el MISMO expected, tolerancias del caso) + modo anclado íntegro del 2.1 — D10: más checks, nunca menos; C4-FED-02 añade la EMISIÓN: árbol BCF 3.0 anclado por md5 de fichero (D12) con GUIDs uuid5 deterministas (D13) y generación inyectada (bcf_generacion); C4-FED-03 añade el IFC SUCIO (D18-D19): camino feliz-degradado con avisos_lectura anclados en el expected; C4-FED-04 añade la INTEGRACIÓN 1.2×1.3 (D21/D23): mixto sucio+limpio con avisos POR MODELO + emisión + estados heterogéneos min(S) + transformación no trivial; C4-FED-05 añade mantener-separada (D22): nodos por modelo sin fundir; C4-FED-06 añade el DERIVADO (D26/D27): .ifc federado anclado por md5 BYTE A BYTE (cabecera SPF determinista con time_stamp de derivado_generacion) + ifc_derivado en el manifiesto + CÁMARA perspectiva determinista en el viewpoint (D29, bbox de orígenes de placement)"
estado          = "service v0.5 (IFC federado derivado + cámara BCF — v0.x, Fase II·h6, D26–D30; la decisión aplazada por D6, cerrada: el Maestro se puede ABRIR)"

# --- contrato C3 (Fase III·h2→h3): cumplimiento normativo multi-código — engine VIVO ---
# Decisiones D1–D5 (contract-first, h2) + D6–D10 (engine, h3) en C3-cumplimiento/DECISIONES.md (OK JM 2026-07-03).
# h2 (contract-first ESTRICTO, patrón C4·h1): 2 esquemas forward-open + pack CTE/2019 + golden GOL-CTE-01
# ANCLADA (checklist FIRMADO como oráculo). h3: engines/cumplimiento DA el veredicto (registro de
# evaluadores DECLARADOS por el pack — D8: multi-código = multi-pack, no un `if`) y el runner ANTEPONE
# el recompute contra el MISMO expected (costura C1/C4, D9). El engine abre el DERIVADO, no federa (D7).
[contracts.C3]
nombre          = "cumplimiento"
schema_version  = "0.1.0"              # 2 esquemas: entrada-cumplimiento + veredicto-cumplimiento (forward-open)
engine          = "engines/cumplimiento"   # engine C3 VIVO (Fase III·h3, D6): paquete uv en engines/
engine_version  = "0.1.0"              # primer release firmado del C3: cumplimiento-v0.1.0 (Llave 2, D10)
pack_normativa  = "normativa/CTE/2019"
golden          = "GOL-CTE-01"
oraculo         = "RECOMPUTE con el engine (Fase III·h3, D9): run_case_c3 regenera el Maestro (federar+derivar con services/federacion) y engines/cumplimiento.verificar() emite el veredicto POR EXIGENCIA, comparado contra el MISMO expected (el checklist FIRMADO que era el oráculo del modo anclado), normalizando el texto libre (evidencia/motivo/descripción/detalle). El engine NO federa (D7): abre el IFC derivado y atribuye por_modelo desde el manifiesto; el pack DECLARA el evaluador por exigencia (D8: el código es un PACK anclado, no un `if`). Conserva ÍNTEGROS los 18 checks anclados del 3.2 (conformidad de esquemas + identidad por hash del C4-FED-06 + coherencia interna) — D10: más checks, nunca menos (21 checks)"
estado          = "engine v0.1 (Fase III·h3, D6–D10): engines/cumplimiento vivo (verificar por registro de evaluadores) + costura del runner (recompute antepuesto) VERDE; pack CTE/2019 enriquecido con evaluador/parametros (md5 y golden de pack re-anclados; expected del C3 intacto); release firmado cumplimiento-v0.1.0 (Llave 2)"

# --- contrato C5 (Fase IV·h1): presupuesto trazable desde la medición — contract-first ---
# Decisiones D1–D5 + D_modelo + D_scope en packages/contracts/C5-presupuesto/DECISIONES.md (OK JM 2026-07-03).
# Contract-first ESTRICTO (patrón C4·h1 / C3·h2): 2 esquemas forward-open + packs criterio/AQ/v1 y
# banco/AQ-DEMO/v1 mínimos + golden GOL-PRE-01 ANCLADA (presupuesto calculado a mano, verificado ×2).
# La medición NACE de los Qto (fixtures propias con Qto inyectado; originales del C4-FED-06 intactos);
# el QA/IDS de C4 garantiza los Qto aguas arriba (D_modelo). El engine engines/presupuesto (hilo
# posterior) ANTEPONDRÁ el recompute (parser Qto + motor) contra el MISMO expected (costura C1/C3/C4).
[contracts.C5]
nombre          = "presupuesto"
schema_version  = "0.1.0"              # 2 esquemas: entrada-presupuesto + salida-presupuesto (forward-open)
engine          = "engines/presupuesto"   # engine C5 VIVO (Fase IV·h2, D6): paquete uv en engines/
engine_version  = "0.2.0"              # 0.1.0 medir+presupuestar (D6-D10) + 0.2.0 write-back 5D escribir_coste (D11-D15); tags presupuesto-v0.1.0/-v0.2.0 (Llave 2)
criterio_pack   = "criterio/AQ/v1"
banco_pack      = "banco/AQ-DEMO/v1"
golden          = "GOL-PRE-01 + GOL-PRE-02"
oraculo         = "modo ANCLADO (contract-first, sin engine): presupuesto calculado a mano y verificado ×2 sobre la medición del Maestro (geometría del C4-FED-06 + Qto inyectados en fixtures propias). run_case_c5 valida conformidad de los 2 esquemas + identidad por hash de las fixtures con Qto + coherencia interna (importe = cantidad × precio; precio == cuadro nº1 == nº2 (Σ componentes + indirectos); PEM = Σ importes = Σ capítulos; GG/BI/IVA/base/PEC según parametros; partidas origen=modelo ⊆ banco con precio == banco y ⊆ criterio; trazabilidad ⊆ GUIDs del modelo; taxonomía de origen cerrada; S&S = 2% del PEM medible). RECOMPUTE ANTEPUESTO (Fase IV·h2, D9): run_case_c5 MIDE desde las fixtures con Qto (engines/presupuesto.medir — la medición nace del modelo, D7) y PRESUPUESTA (presupuestar), comparado contra el MISMO expected (cantidades ±0,5%; mapeo/precios/importes/PEM…PEC exactos; texto libre normalizado). Conserva íntegros los 17 checks anclados del 4.1 (D10: más checks, nunca menos). PEM 7022.53 → PEC 10111.74 EUR"
estado          = "engine v0.2 (Fase IV·h3, D11–D15): WRITE-BACK 5D — engines/presupuesto.escribir_coste escribe el modelo de coste CANÓNICO OpenBIM (IfcCostSchedule + IfcCostItem por capítulo/partida con IfcCostValue=importe y CostQuantities, asignados a los elementos por IfcRelAssignsToControl por GUID, + IfcMonetaryUnit EUR) sobre el DERIVADO FEDERADO (D13; el engine abre el derivado, no federa, D7). Golden GOL-PRE-02: el runner federa+deriva las fixtures con Qto y ancla el 5D por DETERMINISMO (escribir 2×=bytes idénticos) + SEMÁNTICA (el cost schedule casa con el presupuesto; sin md5 hardcodeado, D14 opción b). Sobre v0.1 (D6–D10, medir+presupuestar, GOL-PRE-01 intacto). Releases firmados presupuesto-v0.1.0 (Llave 2, hecho) → presupuesto-v0.2.0 (Llave 2)"

# --- apps (Fase III·h1): el visor abierto DENTRO del monorepo — el vertical TS en la Llave 1 ---
# Re-home del corte mínimo de aqyra-entorno (ARCHIVADO 2026-07-01; árbol == frozen → el corte
# sale del FROZEN firmado). Decisiones V1–V5 en apps/visor/DECISIONES.md. El visor CONSUME el
# derivado (D26/D30) y el árbol BCF (D12/D29); jamás los re-genera (dependencias, PLAN §1).
[apps.visor]
nombre          = "visor"
paquete         = "@aqyra/visor"
version         = "0.7.0"                    # 0.5.0 (3.1) + UX lote 1 (3.4) + COSTE 5D (IV·h4, V7–V12): lectura IfcCostSchedule + heatmap por coste
origen          = "_import/aqyra-entorno/publico/visor (tag firmado cebo-trazado-2026-06-29, 433fe90)"
corte           = "viewer+ifc-loader+registry+spatial-metric+idealize+data-state; NUEVO src/bcf.ts; NUEVO src/cost.ts (lectura del cost schedule 5D + rampa costHeatColor, V8/V9); adaptaciones declaradas: index.ts recortado + viewer.setCamera/setCostHeatmap + package.json real"
consume         = "ifc_derivado del manifiesto (D30) + árbol BCF (D12/D29) + el MAESTRO 5D con IfcCostSchedule (V7), por RUTA LOCAL (V4)"
oraculo         = "E2E headless: fixtures/federado.ifc md5 dcb1e14460f3556107ce35d6dade16c3 (== golden C4-FED-06, D26) + árbol BCF md5 por fichero + cámara D29 == expected (verificada a mano en 2.6); COSTE 5D (V10): fixtures/federado_5d.ifc md5 3e302e5fac409212632ae3fcd3c816ec (== el 5D determinista de GOL-PRE-02) + mapa de coste (importe por partida, costeAsignado por elemento, Σ = PEM medible, EUR)"
estado          = "vertical TS en la Llave 1 (typecheck/build/tests REALES en el paso pnpm de ci.yml); UX lote 1 (Fase III·h4, V6) CERRADO (#1–5,7–9 hechas, #6 diferido); COSTE 5D (Fase IV·h4, V7–V12): src/cost.ts lee IfcCostSchedule/IfcCostItem/IfcRelAssignsToControl/IfcMonetaryUnit → coste por elemento + totales; viewer.setCostHeatmap + demo modo ?5d (heatmap + panel de totales); E2E coste-5d ancla md5 3e302e5f + mapa; federado.ifc (dcb1e144) + su E2E INTACTOS (frontera dura); tags visor-v0.5.0/-v0.6.0 (hechos) → visor-v0.7.0 si Llave 2 (V12)"

